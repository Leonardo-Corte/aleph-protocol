name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default.
permissions:
  contents: read

jobs:
  build-test:
    name: build & test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm exec eslint "packages/*/src/**/*.ts" "e2e/**/*.ts" "examples/**/*.ts"

      - name: Format check
        run: pnpm exec prettier --check "packages/**/*.ts" "e2e/**/*.ts" "examples/**/*.ts"

      - name: Build
        run: pnpm -r build

      - name: Test
        run: node --test "e2e/test/**/*.test.ts" "packages/**/test/**/*.test.ts"

  coverage:
    name: coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Coverage (fails below thresholds)
        run: pnpm test:coverage

  cross-language:
    name: cross-language conformance (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install cryptography
      # An independent Python implementation must reproduce the RFC 8785 vectors
      # byte-for-byte and verify a TS-produced Ed25519 signature — the proof that
      # the protocol is language-independent, not "whatever the TS code does".
      - name: Python conformance
        run: python conformance/python/run_vectors.py

  interop:
    name: cross-language interop (python ↔ ts node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install cryptography
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      # A Python-signed INVOKE (the aleph_protocol SDK) is verified + answered by
      # a real TypeScript node — protocol-level interop, no shared code.
      - name: Cross-language interop
        run: node --test "e2e/test/interop.test.ts"

  postgres:
    name: store contract (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: aleph
          POSTGRES_DB: aleph_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:aleph@127.0.0.1:5432/aleph_test
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      # Runs the SAME store contract suite against a real Postgres (not skipped).
      - name: Postgres store contract
        run: node --test "e2e/test/store-postgres.test.ts"

  contracts:
    name: contracts (foundry) + on-chain rail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install contract deps
        working-directory: contracts
        run: forge install OpenZeppelin/openzeppelin-contracts@v5.1.0 --no-git && forge install foundry-rs/forge-std --no-git
      - name: Forge build + test
        working-directory: contracts
        run: forge test -vvv
      - name: Forge coverage (AlephEscrow)
        working-directory: contracts
        run: forge coverage --no-match-coverage 'test/|lib/' --report summary
      # The on-chain rail end-to-end against anvil (foundry-toolchain provides it).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: On-chain settlement integration (anvil)
        run: |
          # The test looks for anvil at ~/.foundry/bin/anvil; link it there only
          # if it isn't already (foundry-toolchain may place it there directly).
          mkdir -p "$HOME/.foundry/bin"
          if [ ! -e "$HOME/.foundry/bin/anvil" ]; then ln -s "$(which anvil)" "$HOME/.foundry/bin/anvil"; fi
          node --test "e2e/test/settle-evm.test.ts"
      # The agent path moving REAL value: client.invoke/compose pay a TS node
      # on-chain via the EVM rail (the in-memory and EVM rails share one seam);
      # did:pkh binds the payout address to the node identity; and reputation
      # accrues from on-chain-verified attestations.
      - name: On-chain PAY + did:pkh + on-chain attestation (anvil)
        run: node --test "e2e/test/settle-evm-agent.test.ts" "e2e/test/attest-onchain.test.ts"

  secret-scan:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Scan tracked files for secrets
        run: node scripts/secret-scan.mjs
