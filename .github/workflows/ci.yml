name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default.
permissions:
  contents: read

jobs:
  build-test:
    name: build & test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm exec eslint "packages/*/src/**/*.ts" "e2e/**/*.ts" "examples/**/*.ts"

      - name: Format check
        run: pnpm exec prettier --check "packages/**/*.ts" "e2e/**/*.ts" "examples/**/*.ts"

      - name: Build
        run: pnpm -r build

      - name: Test
        run: node --test "e2e/test/**/*.test.ts" "packages/**/test/**/*.test.ts"

  coverage:
    name: coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Coverage (fails below thresholds)
        run: pnpm test:coverage

  # Placeholder for future Solidity (Foundry) tests — Section 4 of the roadmap.
